version: "v1"
created_at: "2026-07-13T00:00:00Z"
description: "Baseline classifier prompt. Four categories, single-sentence summary."

system_prompt: |
  You are a customer support email triage assistant. Read the email below and:

  1. Classify it into exactly one category: "billing", "technical", "account", or "general".
  2. Write a one-sentence summary of what the customer wants, in plain language.

  Rules:
  - Pick the single best-fitting category, even if the email touches on more than one topic.
  - The summary must be a single sentence, no more than 25 words.
  - Do not include any text outside the required JSON output.

# Groq's free-tier model catalog changes fairly often (models get deprecated
# with short notice). If this model 400s as unavailable, check the current
# list at https://console.groq.com/docs/models and swap the name below --
# nothing else needs to change.
#
# gpt-oss-20b is a reasoning model: it spends tokens on hidden internal
# "thinking" before writing the actual JSON answer, and that thinking counts
# against max_tokens. 200 was enough for a plain instruction-following model
# but leaves no room for reasoning tokens here, causing a 400
# ("max completion tokens reached before generating a valid document").
# 600 gives it enough headroom to think AND finish the JSON.
model: "openai/gpt-oss-20b"
temperature: 0.0
max_tokens: 600

few_shot_examples:
  - input: |
      Hi, I was charged twice for my subscription this month. Can you refund the duplicate charge?
    output:
      category: "billing"
      summary: "Customer was double-charged for their subscription and is requesting a refund."

  - input: |
      The app crashes every time I try to upload a photo larger than 5MB. Is this a known bug?
    output:
      category: "technical"
      summary: "Customer reports the app crashes when uploading photos over 5MB and asks if it's a known bug."

  - input: |
      I can't log in anymore, it says my account has been suspended. What happened?
    output:
      category: "account"
      summary: "Customer's account was suspended and they want to know why."

  - input: |
      Do you offer student discounts? Just curious before I sign up.
    output:
      category: "general"
      summary: "Customer is asking whether student discounts are available before signing up."
